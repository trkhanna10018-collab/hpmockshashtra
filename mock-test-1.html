let current=0
let score=0
let userAnswers={}
let studentName=""
let studentPhone=""

let time=5400
let timerInterval

function startTimer(){

timerInterval=setInterval(()=>{

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerHTML="Time Left: "+min+":"+sec

time--

if(time<0){

clearInterval(timerInterval)
showResult()

}

},1000)

}

function beginTest(){

studentName=document.getElementById("name").value
studentPhone=document.getElementById("phone").value

if(studentName=="" || studentPhone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("questionBox").style.display="block"

setTimeout(startTimer,5000)

showQuestion()

}

function showQuestion(){

let q=questions[current]

let html=""

html+="<h3>Q"+(current+1)+": "+q.en+"</h3>"
html+="<p>"+q.hin+"</p>"

html+=optionHTML("A",q.A)
html+=optionHTML("B",q.B)
html+=optionHTML("C",q.C)
html+=optionHTML("D",q.D)

html+="<button onclick='nextQuestion()'>Next</button>"

document.getElementById("questionBox").innerHTML=html

}

function optionHTML(letter,text){

return `
<label class="option">
<input type="radio" name="ans" value="${letter}">
${letter}. ${text}
</label>
`

}

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){

userAnswers[current]=selected.value

if(selected.value==questions[current].ans){
score++
}

}

current++

if(current<questions.length){

showQuestion()

}else{

showResult()

}

}

function showResult(){

clearInterval(timerInterval)

document.getElementById("questionBox").style.display="none"

let html=""

html+="<h3>Result</h3>"
html+="Name: "+studentName+"<br>"
html+="Phone: "+studentPhone+"<br><br>"
html+="Score: "+score+" / "+questions.length+"<br><br>"

questions.forEach((q,i)=>{

html+="<hr>"

html+="<b>Q"+(i+1)+": "+q.eng+"</b><br>"
html+=q.hin+"<br><br>"

html+="A. "+q.A+"<br>"
html+="B. "+q.B+"<br>"
html+="C. "+q.C+"<br>"
html+="D. "+q.D+"<br><br>"

html+="Your Answer: "+(userAnswers[i] || "Not Attempted")+"<br>"
html+="Correct Answer: "+q.ans+"<br>"

})

html+="<br><button onclick='downloadPDF()'>Download PDF</button>"

document.getElementById("resultBox").innerHTML=html
document.getElementById("resultBox").style.display="block"

}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element=document.getElementById("resultBox")

let canvas=await html2canvas(element,{scale:2})

let imgData=canvas.toDataURL("image/png")

let pdf=new jsPDF("p","mm","a4")

let imgWidth=190
let pageHeight=297
let imgHeight=canvas.height*imgWidth/canvas.width

let heightLeft=imgHeight
let position=10

pdf.addImage(imgData,"PNG",10,position,imgWidth,imgHeight)

heightLeft-=pageHeight

while(heightLeft>0){

position=heightLeft-imgHeight

pdf.addPage()

pdf.addImage(imgData,"PNG",10,position,imgWidth,imgHeight)

heightLeft-=pageHeight

}

pdf.save("Mock_Test_Result.pdf")

}

</script>

function openTests(){

document.getElementById("home").style.display="none"

}



/* =========================
MOCK TEST START
========================= */

function startTest(num){

testNumber=num
current=1
score=0
userAnswers={}

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}



/* =========================
NAME PHONE FORM
========================= */

function begin(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"
document.getElementById("qBox").style.display="block"

loadQuestion()

}

},1000)

}



/* =========================
QUESTION LOAD FUNCTION
========================= */

function loadQuestion(){

let q=questions[testNumber][current-1]

document.getElementById("qText").innerHTML=current+". "+q.q

document.getElementById("optA").innerHTML=q.A
document.getElementById("optB").innerHTML=q.B
document.getElementById("optC").innerHTML=q.C
document.getElementById("optD").innerHTML=q.D

document.querySelectorAll('input[name="opt"]').forEach(r=>r.checked=false)

}



/* =========================
NEXT QUESTION
========================= */

function next(){

let sel=document.querySelector('input[name="opt"]:checked')

if(sel){

userAnswers[current]=sel.value

if(sel.value==questions[testNumber][current-1].ans){
score++
}

}

current++

if(current<=100){

loadQuestion()

}else{

showResult()

}

}



/* =========================
RESULT + REVIEW
========================= */

function showResult(){

document.getElementById("qBox").style.display="none"
document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+"/100"

let review=""

for(let i=1;i<=100;i++){

let q=questions[testNumber][i-1]

review+=`

<div class="review">

<b>Q${i}: ${q.q}</b><br><br>

A: ${q.A}<br>
B: ${q.B}<br>
C: ${q.C}<br>
D: ${q.D}<br><br>

<b>Your Answer:</b> ${userAnswers[i] || "Not Attempted"}<br>
<b>Correct Answer:</b> ${q.ans}

</div>
`

}

document.getElementById("review").innerHTML=review

}



/* =========================
PDF GENERATION
========================= */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Mock Test Result",20,y); y+=10

doc.text("Name : "+name,20,y); y+=8
doc.text("Phone : "+phone,20,y); y+=8

doc.text("Score : "+score+"/3",20,y); y+=12

for(let i=1;i<=100;i++){

let q=questions[testNumber][i-1]

doc.text("Q"+i+": "+q.q,20,y); y+=8

doc.text("A: "+q.A,25,y); y+=6
doc.text("B: "+q.B,25,y); y+=6
doc.text("C: "+q.C,25,y); y+=6
doc.text("D: "+q.D,25,y); y+=8

doc.text("Your Answer: "+(userAnswers[i] || "Not Attempted"),25,y); y+=6
doc.text("Correct Answer: "+q.ans,25,y); y+=10

if(y>270){
doc.addPage()
y=20
}

}

doc.save("Mock_Test_Result.pdf")

}

<h2>JOA (IT) 2026 Preparation Portal</h2>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

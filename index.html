<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOA IT Mock Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2ff;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
background:white;
margin-top:40px;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.center{text-align:center}

button{
background:#2d5cff;
color:white;
border:none;
padding:10px 18px;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c3cb0;
}

.option{
display:block;
margin-top:6px;
}

.timer{
font-size:30px;
color:red;
font-weight:bold;
}

</style>

<script>

let name=""
let phone=""
let current=1
let score=0
let userAnswers={}

/* QUESTIONS DATABASE */

let questions=[

{q:"Which memory stores BIOS?",A:"RAM",B:"ROM",C:"Cache",D:"Register",ans:"B"},

{q:"Which device connects networks?",A:"Switch",B:"Hub",C:"Router",D:"Repeater",ans:"C"},

{q:"Sun rises in which direction?",A:"West",B:"North",C:"South",D:"East",ans:"D"},

{q:"Which protocol is secure web protocol?",A:"HTTP",B:"FTP",C:"HTTPS",D:"SMTP",ans:"C"},

{q:"Which Excel function counts condition cells?",A:"COUNT",B:"COUNTIF",C:"SUM",D:"AVERAGE",ans:"B"},

{q:"Which topology connects every node directly?",A:"Bus",B:"Star",C:"Mesh",D:"Ring",ans:"C"},

{q:"Which OS component talks to hardware?",A:"Kernel",B:"Shell",C:"Compiler",D:"Interpreter",ans:"A"},

{q:"Pivot table mainly used for?",A:"Formatting",B:"Data analysis",C:"Printing",D:"Charts",ans:"B"},

{q:"Which malware demands money?",A:"Spyware",B:"Trojan",C:"Ransomware",D:"Worm",ans:"C"},

{q:"Capital of Himachal Pradesh?",A:"Shimla",B:"Manali",C:"Kullu",D:"Solan",ans:"A"}

]

/* OPEN MOCK TEST LIST */

function openTests(){

document.getElementById("home").style.display="none"
document.getElementById("testList").style.display="block"

}

/* START TEST BUTTON */

function startTest(){

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}

/* START AFTER NAME */

function beginTest(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"

showQuestion()

}

},1000)

}

/* SHOW QUESTION */

function showQuestion(){

let q=questions[current-1]

let html=""

html+="<h3>Q"+current+". "+q.q+"</h3>"

html+='<label class="option"><input type="radio" name="ans" value="A"> A. '+q.A+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="B"> B. '+q.B+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="C"> C. '+q.C+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="D"> D. '+q.D+'</label>'

html+="<br><button onclick='nextQuestion()'>Next</button>"

document.getElementById("questionBox").innerHTML=html
document.getElementById("questionBox").style.display="block"

}

/* NEXT QUESTION */

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){

userAnswers[current]=selected.value

if(selected.value==questions[current-1].ans){

score++

}

}

current++

if(current<=questions.length){

showQuestion()

}else{

showResult()

}

}

/* RESULT */

function showResult(){

document.getElementById("questionBox").style.display="none"

document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+" / "+questions.length

}

/* PDF GENERATION */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let y=20

doc.text("JOA IT MOCK TEST RESULT",20,y)
y+=10

doc.text("Name : "+name,20,y)
y+=8

doc.text("Phone : "+phone,20,y)
y+=8

doc.text("Score : "+score+"/"+questions.length,20,y)

y+=12

for(let i=0;i<questions.length;i++){

let q=questions[i]

doc.text("Q"+(i+1)+": "+q.q,20,y)
y+=8

doc.text("A. "+q.A,25,y); y+=6
doc.text("B. "+q.B,25,y); y+=6
doc.text("C. "+q.C,25,y); y+=6
doc.text("D. "+q.D,25,y); y+=6

doc.text("Your Answer : "+(userAnswers[i+1] || "Not Attempted"),25,y); y+=6

doc.text("Correct Answer : "+q.ans,25,y)

y+=10

if(y>270){

doc.addPage()
y=20

}

}

doc.save("Mock_Test_Result.pdf")

}

</script>
</head>

<body>

<div class="container center" id="home">

<h2>HP JOA (IT) MOCK TEST PORTAL</h2>

<br>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

</div>


<div class="container center" id="testList" style="display:none">

<h3>Select Mock Test</h3>

<button onclick="startTest()">Mock Test 01</button>

</div>


<div class="container" id="formBox" style="display:none">

<h3>Candidate Details</h3>

Name<br>
<input type="text" id="name"><br><br>

Phone<br>
<input type="text" id="phone"><br><br>

<button onclick="beginTest()">Start Test</button>

</div>


<div class="container center" id="countBox" style="display:none">

<h3>Test will start in</h3>

<div class="timer" id="count">5</div>

</div>


<div class="container" id="questionBox" style="display:none"></div>


<div class="container center" id="resultBox" style="display:none">

<h2 id="score"></h2>

<br>

<button onclick="downloadPDF()">Download Result PDF</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Mockshastra - JOA IT Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
}

.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.card{
max-width:800px;
margin:20px auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
background:linear-gradient(45deg,#22c55e,#16a34a);
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.option{
display:block;
background:rgba(255,255,255,0.1);
padding:10px;
margin:8px 0;
border-radius:8px;
cursor:pointer;
}

.timer{
text-align:center;
font-size:20px;
margin:10px;
}

</style>

</head>

<body>

<div class="header">MOCKSHASTRA - JOA IT MOCK TEST</div>

<div class="timer" id="timer" style="display:none"></div>

<div class="card" id="formBox">
<h3>Enter Details</h3>
<input id="name" placeholder="Enter Name">
<input id="phone" placeholder="Enter Phone">
<button onclick="startTest()">Start Test</button>
</div>

<div class="card" id="questionBox" style="display:none"></div>

<div class="card" id="resultBox" style="display:none"></div>

<!-- PDF hidden -->
<div id="pdfContent" style="display:none;background:white;color:black;padding:20px"></div>

<script>

let questions=[
{
id:1,
en:"Which aggregate function calculates the average value?",
hi:"कौन-सा function average निकालता है?",
A:"SUM()",
B:"AVG()",
C:"COUNT()",
D:"MAX()",
ans:"B"
},
{
id:2,
en:"Which SQL clause is used to group rows?",
hi:"Rows को group करने के लिए कौन सा clause?",
A:"ORDER BY",
B:"GROUP BY",
C:"WHERE",
D:"HAVING",
ans:"B"
}
]

let current=0
let score=0
let userAnswers={}

let studentName=""
let studentPhone=""

let time=20
let timerInterval

function startTest(){

studentName=document.getElementById("name").value
studentPhone=document.getElementById("phone").value

if(studentName=="" || studentPhone==""){
alert("Enter details")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("questionBox").style.display="block"
document.getElementById("timer").style.display="block"

startTimer()
showQuestion()
}

function startTimer(){
timerInterval=setInterval(()=>{
let m=Math.floor(time/60)
let s=time%60
document.getElementById("timer").innerHTML="⏱ "+m+":"+(s<10?"0":"")+s
time--

if(time<0){
clearInterval(timerInterval)
alert("Time Over")
showResult()
}
},1000)
}

function showQuestion(){

let q=questions[current]

let html=""
html+=`<b>Name:</b> ${studentName}<br>`
html+=`<b>Phone:</b> ${studentPhone}<br><br>`

html+=`<h3>Q${current+1}. ${q.en}</h3>`
html+=`<p>${q.hi}</p>`

html+=`<label class="option"><input type="radio" name="ans" value="A"> A. ${q.A}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="B"> B. ${q.B}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="C"> C. ${q.C}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="D"> D. ${q.D}</label>`

html+=`<br><button onclick="nextQuestion()">Next</button>`

document.getElementById("questionBox").innerHTML=html
}

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){
userAnswers[current]=selected.value
if(selected.value==questions[current].ans){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
showResult()
}
}

function showResult(){

clearInterval(timerInterval)

document.getElementById("questionBox").style.display="none"

let box=document.getElementById("resultBox")
box.style.display="block"

let html=""

html+=`<h2>RESULT</h2>`
html+=`<b>Name:</b> ${studentName}<br>`
html+=`<b>Phone:</b> ${studentPhone}<br>`
html+=`<b>Score:</b> ${score}/${questions.length}<br><br>`

questions.forEach((q,i)=>{
html+=`<hr>`
html+=`<b>Q${i+1}. ${q.en}</b><br>`
html+=`${q.hi}<br><br>`
html+=`A. ${q.A}<br>`
html+=`B. ${q.B}<br>`
html+=`C. ${q.C}<br>`
html+=`D. ${q.D}<br><br>`
html+=`Your Answer: ${userAnswers[i] || "Not Attempted"}<br>`
html+=`Correct Answer: ${q.ans}<br>`
})

html+=`<br><button onclick="downloadPDF()">Download PDF</button>`

box.innerHTML=html

// PDF content
document.getElementById("pdfContent").innerHTML=html
}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element=document.getElementById("pdfContent")
element.style.display="block"

let canvas=await html2canvas(element,{scale:2,backgroundColor:"#ffffff"})

let imgData=canvas.toDataURL("image/jpeg",0.9)

let pdf=new jsPDF("p","mm","a4")

let width=190
let height=canvas.height*width/canvas.width

// 🔥 MULTIPLE WATERMARK
for(let y=40;y<280;y+=60){
pdf.setFontSize(20)
pdf.setTextColor(200,200,200)
pdf.text("MOCKSHASTRA",20,y,{angle:45})
pdf.text("MOCKSHASTRA",100,y,{angle:45})
}

pdf.addImage(imgData,"JPEG",10,10,width,height)

pdf.save("Mockshastra_Result.pdf")

element.style.display="none"
}

</script>

</body>
</html>
